{% extends 'base.html' %}

{% block title %}404 - Страница не найдена | SeeYouInside{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h1 class="display-1 fw-bold text-muted mb-4">404</h1>
                    <i class="fas fa-map-signs fa-4x text-warning mb-4"></i>
                    <h2 class="mb-4">Страница не найдена</h2>
                    <p class="text-muted mb-4">К сожалению, запрашиваемая страница не существует или была перемещена.</p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'shop:index' %}" class="btn btn-primary">
                            <i class="fas fa-home me-2"></i>На главную
                        </a>
                        <a href="{% url 'shop:catalog' %}" class="btn btn-outline-dark">
                            <i class="fas fa-shopping-bag me-2"></i>В каталог
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
